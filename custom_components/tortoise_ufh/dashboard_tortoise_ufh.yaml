# =============================================================================
# Tortoise-UFH — FALLBACK Lovelace dashboard (OPTIONAL)
# =============================================================================
# The custom sidebar panel (frontend/tortoise-ufh-panel.js, registered by
# panel.py) is the PRIMARY UI. This YAML exists only as a plain-Lovelace
# fallback for owners who prefer standard cards, want a printable overview,
# or are debugging the integration's entities directly.
#
# HOW TO USE (all optional):
#   1. Settings -> Dashboards -> Add dashboard -> "New dashboard from scratch".
#   2. Open the new dashboard -> (three dots) -> "Edit Dashboard" ->
#      "Raw configuration editor".
#   3. Paste the contents below (everything under `title:`), then Save.
#
# ENTITY IDS: Home Assistant derives each id from "<device> <entity name>"
# (since v0.5.0: room device + translated entity name; ids below are the
# English defaults for a NEW install — installs upgraded from pre-0.5.0 keep
# their old ids via the registry).
#   Global (hub device "Tortoise-UFH"):
#             number.tortoise_ufh_home_temperature
#             select.tortoise_ufh_home_mode
#                        (heating/transitional/cooling/off)
#             sensor.tortoise_ufh_global_safe_dew_point   (°C)
#             sensor.tortoise_ufh_algorithm_status
#             sensor.tortoise_ufh_watchdog_status
#   Per room the id is "<room>_<name>" (<room> = slug of the room device,
#   no tortoise_ufh_ prefix), e.g. for a room named "Living room":
#             select.living_room_control_state               (off/live)
#             number.living_room_setpoint_offset             (K, -5..+5)
#             sensor.living_room_recommended_valve_position  (%)
#             sensor.living_room_fast_source_mode
#             sensor.living_room_control_error               (°C; also
#               _temperature_trend, _integral_term_valve,
#               _trend_damping_term_valve, _dew_point, ...)
# The integration creates NO room-temperature sensor of its own — the
# "temperature" entities below (sensor.living_room_temp, sensor.bathroom_temp)
# stand for the SOURCE sensors you mapped in the config flow; substitute yours.
# Adjust all ids to match your actual entity registry if you renamed rooms.
# The two rooms below (living_room, bathroom) are EXAMPLES — copy/edit the
# per-room blocks for each of your configured rooms.
# =============================================================================

# title: Tortoise-UFH (fallback)
# views:
#   - title: Tortoise-UFH
#     path: tortoise-ufh
#     icon: mdi:tortoise
#     cards:
#
#       # ---------------------------------------------------------------------
#       # GLOBAL — system-wide controls and status
#       # ---------------------------------------------------------------------
#       - type: entities
#         title: Tortoise-UFH — Global
#         show_header_toggle: false
#         entities:
#           - entity: number.tortoise_ufh_home_temperature
#             name: Home temperature (°C)
#             icon: mdi:home-thermometer
#           - entity: select.tortoise_ufh_home_mode
#             name: Home mode
#             icon: mdi:home-thermometer
#           - entity: sensor.tortoise_ufh_global_safe_dew_point
#             name: Global safe dew point (°C -> HP)
#             icon: mdi:water-percent
#           - entity: sensor.tortoise_ufh_algorithm_status
#             name: Algorithm status
#             icon: mdi:state-machine
#           - entity: sensor.tortoise_ufh_watchdog_status
#             name: Watchdog status
#             icon: mdi:dog-side
#
#       # ---------------------------------------------------------------------
#       # ROOM: Living room
#       # ---------------------------------------------------------------------
#       - type: glance
#         title: Living room
#         show_state: true
#         columns: 4
#         entities:
#           - entity: select.living_room_control_state
#             name: Control (off/live)
#           - entity: sensor.living_room_temp
#             name: Temp (°C)
#           - entity: number.living_room_setpoint_offset
#             name: Offset (K)
#           - entity: sensor.living_room_recommended_valve_position
#             name: Valve (%)
#           - entity: sensor.living_room_fast_source_mode
#             name: Fast source
#
#       - type: history-graph
#         title: Living room — temp vs recommended valve
#         hours_to_show: 24
#         refresh_interval: 300
#         entities:
#           - entity: sensor.living_room_temp
#             name: Temperature (°C)
#           - entity: sensor.living_room_recommended_valve_position
#             name: Recommended valve (%)
#
#       # ---------------------------------------------------------------------
#       # ROOM: Bathroom
#       # ---------------------------------------------------------------------
#       - type: glance
#         title: Bathroom
#         show_state: true
#         columns: 4
#         entities:
#           - entity: select.bathroom_control_state
#             name: Control (off/live)
#           - entity: sensor.bathroom_temp
#             name: Temp (°C)
#           - entity: number.bathroom_setpoint_offset
#             name: Offset (K)
#           - entity: sensor.bathroom_recommended_valve_position
#             name: Valve (%)
#           - entity: sensor.bathroom_fast_source_mode
#             name: Fast source
#
#       - type: history-graph
#         title: Bathroom — temp vs recommended valve
#         hours_to_show: 24
#         refresh_interval: 300
#         entities:
#           - entity: sensor.bathroom_temp
#             name: Temperature (°C)
#           - entity: sensor.bathroom_recommended_valve_position
#             name: Recommended valve (%)
#
#   # =======================================================================
#   # VIEW: Strojenie / Tuning — per-room PI + trend controller internals
#   # =======================================================================
#   # Pairs, per room, the setpoint / temperature / valve response with the raw
#   # PI + trend-damping term contributions, so a gain change (kp / ki / kt) can
#   # be judged against overshoot and settling. error_c, trend_c_per_h and the
#   # *_term sensors carry state_class=measurement, so statistics-graph can chart
#   # their long-term statistics.
#   - title: Strojenie / Tuning
#     path: tuning
#     icon: mdi:tune
#     cards:
#
#       # --- ROOM: Living room ---------------------------------------------
#       - type: history-graph
#         title: Living room — setpoint, temperature & valve
#         hours_to_show: 24
#         refresh_interval: 300
#         entities:
#           - entity: number.living_room_setpoint_offset
#             name: Room offset (K)
#           - entity: sensor.living_room_temp
#             name: Temperature (°C)
#           - entity: sensor.living_room_recommended_valve_position
#             name: Recommended valve (%)
#
#       - type: statistics-graph
#         title: Living room — PI + trend internals
#         period: hour
#         stat_types:
#           - mean
#         chart_type: line
#         entities:
#           - entity: sensor.living_room_control_error
#             name: Error (°C)
#           - entity: sensor.living_room_temperature_trend
#             name: Trend (°C/h)
#           - entity: sensor.living_room_integral_term_valve
#             name: Integral term (%)
#           - entity: sensor.living_room_trend_damping_term_valve
#             name: Trend-damping term (%)
#
#       # --- ROOM: Bathroom ------------------------------------------------
#       - type: history-graph
#         title: Bathroom — setpoint, temperature & valve
#         hours_to_show: 24
#         refresh_interval: 300
#         entities:
#           - entity: number.bathroom_setpoint_offset
#             name: Room offset (K)
#           - entity: sensor.bathroom_temp
#             name: Temperature (°C)
#           - entity: sensor.bathroom_recommended_valve_position
#             name: Recommended valve (%)
#
#       - type: statistics-graph
#         title: Bathroom — PI + trend internals
#         period: hour
#         stat_types:
#           - mean
#         chart_type: line
#         entities:
#           - entity: sensor.bathroom_control_error
#             name: Error (°C)
#           - entity: sensor.bathroom_temperature_trend
#             name: Trend (°C/h)
#           - entity: sensor.bathroom_integral_term_valve
#             name: Integral term (%)
#           - entity: sensor.bathroom_trend_damping_term_valve
#             name: Trend-damping term (%)
